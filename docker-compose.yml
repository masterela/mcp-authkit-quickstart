services:
  # ── Keycloak — primary OIDC provider ────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    ports:
      - "8889:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost:8080\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '\"status\": \"UP\"' && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Redis — token + pending store ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MCP server ───────────────────────────────────────────────────────────────
  server:
    build: .
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      # Redis is on the internal Docker network, override only this
      REDIS_URL: redis://redis:6379
    # Make `localhost` inside the container resolve to the Docker host so that
    # KEYCLOAK_URL=http://localhost:8889/... (from .env) reaches Keycloak's
    # published port — keeping the issuer URL identical inside and outside Docker.
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8005/.well-known/oauth-authorization-server || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
